name: Build installer

# Builds the Windows installer from source. Pushing a version tag (e.g. v1.0.0)
# also publishes it as a downloadable GitHub Release asset. Can also be run
# manually from the Actions tab (uploads the installer as a build artifact).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller AlbionMarket.spec --noconfirm

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ([string]::IsNullOrWhiteSpace($ver) -or $ver -eq "${{ github.ref_name }}") { $ver = "0.0.0" }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc "/DMyAppVersion=$ver" installer\AlbionMarket.iss

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlbionMarket-Setup
          path: installer_out/*.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_out/*.exe
          generate_release_notes: true
